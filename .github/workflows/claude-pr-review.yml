name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "dependabot[bot]"
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This is an MCP (Model Context Protocol) server project built with TypeScript/ESM.
            It exposes Alibaba Cloud Yunxiao DevOps OpenAPI as MCP tools.

            Please review this pull request with a focus on:
            - TypeScript type safety and Zod schema correctness
            - API compatibility (no unintended breaking changes to tool names or input schemas)
            - Security implications (no credential leaks, proper input validation)
            - Dependency updates: verify no breaking changes in changelogs

            For dependabot PRs, focus on whether the dependency update is safe and compatible.
            For feature PRs, also check code quality, architecture consistency, and test coverage.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
